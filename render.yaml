services:
  - type: web
    name: linguapath
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    nodeVersion: "20"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/data/prod.db
      - key: UPLOAD_DIR
        value: /data/avatars
      - key: AUTH_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: NEXTAUTH_URL
        sync: false          # set to your Render URL, e.g. https://linguapath.onrender.com

    # Persistent disk — required to keep DB + avatars across deploys
    # NOTE: disk requires a paid plan (Starter $7/mo or higher)
    # Remove the disk section if using free tier (data resets on each deploy)
    disk:
      name: linguapath-data
      mountPath: /data
      sizeGB: 1
