services:
  - type: web
    name: linguapath
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    nodeVersion: "20"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # MongoDB Atlas connection string — set manually in Render dashboard
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false          # Set to your Render URL, e.g. https://linguapath.onrender.com
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
